version: "3.9"

services:

  pipeline:
    build: .
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
      - ./assets:/app/assets
      - ./client_secrets.json:/app/client_secrets.json:ro
      - ./token.pickle:/app/token.pickle
    depends_on:
      - redis
    command: python main.py

  worker:
    build: .
    env_file: .env
    environment:
      - USE_REDIS=true
    volumes:
      - ./output:/app/output
      - ./data:/app/data
      - ./logs:/app/logs
      - ./assets:/app/assets
      - ./client_secrets.json:/app/client_secrets.json:ro
      - ./token.pickle:/app/token.pickle
    depends_on:
      - redis
    command: python main.py --worker
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
